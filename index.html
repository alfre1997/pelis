<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Stream Sniper v3 | VAST & XML Decoder</title>
    <style>
        :root { --bg: #0d1117; --accent: #8b5cf6; --text: #c9d1d9; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        textarea { width: 100%; height: 150px; background: #000; color: #10b981; border: 1px solid #30363d; border-radius: 8px; padding: 10px; font-family: monospace; }
        .btn { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .result-card { background: #161b22; border: 1px solid #30363d; padding: 15px; margin-top: 10px; border-radius: 8px; }
        .ad-warning { color: #f87171; font-size: 0.8rem; font-weight: bold; }
        .video-link { color: #58a6ff; word-break: break-all; text-decoration: none; display: block; margin: 10px 0; }
        .tag { background: #30363d; padding: 3px 7px; border-radius: 4px; font-size: 0.7rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎯 Decodificador de XML / VAST / Código Fuente</h2>
    <p>Pega aquí el contenido del XML que abriste en el navegador:</p>
    <textarea id="inputData" placeholder="Pega el <VAST>...</VAST> o cualquier código aquí..."></textarea>
    <button class="btn" onclick="analyze()">ANALIZAR CONTENIDO</button>

    <div id="results"></div>
</div>

<script>
    function analyze() {
        const data = document.getElementById('inputData').value;
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = "<h3>Resultados encontrados:</h3>";

        // Regex para buscar enlaces dentro de CDATA y comillas
        const linkRegex = /(?:<!\[CDATA\[\s*|["'])(https?:\/\/[^\]"'\s>]+)(?:\s*\]\]>|["'])/g;
        let match;
        const found = new Set();

        while ((match = linkRegex.exec(data)) !== null) {
            found.add(match[1].trim());
        }

        if (found.size === 0) {
            resultsDiv.innerHTML += "<p>No se encontraron enlaces de video válidos.</p>";
            return;
        }

        found.forEach(link => {
            const isAd = link.toLowerCase().includes('ad') || link.toLowerCase().includes('betwinner') || link.toLowerCase().includes('tracking');
            const isVideo = link.includes('.mp4') || link.includes('.m3u8') || link.includes('.ts');

            if (isVideo) {
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <span class="tag">${isVideo ? 'ARCHIVO DE VIDEO' : 'LINK'}</span>
                    ${isAd ? '<span class="ad-warning">⚠️ POSIBLE ANUNCIO</span>' : ''}
                    <a href="${link}" target="_blank" class="video-link">${link}</a>
                    <button onclick="navigator.clipboard.writeText('${link}'); alert('Copiado')">Copiar Link</button>
                `;
                resultsDiv.appendChild(card);
            }
        });
    }
</script>
</body>
</html>
