<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Sniper | Proxy Edition</title>
    <style>
        :root {
            --bg: #0b0e14;
            --card: #161b22;
            --accent: #238636; /* Verde tipo GitHub */
            --danger: #da3633;
            --text: #c9d1d9;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container { width: 100%; max-width: 800px; }

        .panel {
            background: var(--card);
            padding: 25px;
            border-radius: 8px;
            border: 1px solid #30363d;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .alert-box {
            background: rgba(218, 54, 51, 0.1);
            border: 1px solid var(--danger);
            color: #ff7b72;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        .alert-box a { color: #58a6ff; font-weight: bold; }

        .input-group { display: flex; gap: 10px; margin-top: 15px; }

        input {
            flex: 1;
            padding: 10px;
            background: #0d1117;
            border: 1px solid #30363d;
            color: white;
            border-radius: 6px;
        }

        button {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-proxy { background: var(--accent); color: white; }
        .btn-proxy:hover { background: #2ea043; }

        #results { margin-top: 25px; }

        .link-item {
            background: #0d1117;
            padding: 12px;
            border: 1px solid #30363d;
            margin-bottom: 8px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .link-item a { color: #58a6ff; text-decoration: none; font-size: 0.85em; word-break: break-all; margin-right: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h2 style="margin-top:0;">🎯 Extractor con Proxy</h2>
        
        <div class="alert-box">
            <strong>⚠️ PASO OBLIGATORIO:</strong> 
            Para que este extractor funcione, primero debes activar el acceso temporal al proxy haciendo clic aquí: 
            <br><br>
            <a href="https://cors-anywhere.herokuapp.com/corsdemo" target="_blank">👉 ACTIVAR PROXY AQUÍ</a>
            <br><br>
            <em>(Si no haces clic y presionas el botón azul en esa página, GitHub no podrá leer los enlaces).</em>
        </div>

        <div class="input-group">
            <input type="text" id="targetUrl" placeholder="https://cuevana.io/pelicula/ejemplo">
            <button class="btn-proxy" onclick="extractWithProxy()">Extraer con Proxy</button>
        </div>
    </div>

    <div id="results"></div>
</div>

<script>
    async function extractWithProxy() {
        const url = document.getElementById('targetUrl').value;
        const resultsDiv = document.getElementById('results');
        
        if (!url) return alert("Ingresa una URL");

        resultsDiv.innerHTML = "<p>Conectando a través del servidor proxy...</p>";

        // Configuración del Proxy de Heroku (CORS Anywhere)
        const proxyUrl = "https://cors-anywhere.herokuapp.com/";
        
        try {
            const response = await fetch(proxyUrl + url, {
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                }
            });

            if (response.status === 403) {
                throw new Error("Proxy no activado");
            }

            const html = await response.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            
            // Buscador de patrones de video/streaming
            const linksFound = [];
            const elements = doc.querySelectorAll('iframe, source, video, a');
            
            elements.forEach(el => {
                const src = el.src || el.href;
                if (src && src.startsWith('http')) {
                    // Filtrar solo cosas interesantes (reproductores, archivos de video)
                    if (src.includes('embed') || src.includes('player') || src.includes('.m3u8') || src.includes('storage')) {
                        linksFound.push(src);
                    }
                }
            });

            renderResults([...new Set(linksFound)]);

        } catch (error) {
            let msg = "Error de conexión.";
            if (error.message === "Proxy no activado") {
                msg = "Debes activar el proxy en el enlace de arriba (botón azul en la otra pestaña).";
            }
            resultsDiv.innerHTML = `<p style="color:var(--danger)">${msg}</p>`;
        }
    }

    function renderResults(links) {
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = `<h3>Resultados (${links.length}):</h3>`;

        if (links.length === 0) {
            resultsDiv.innerHTML += "<p>No se encontraron enlaces visibles. El sitio podría estar usando JavaScript para ocultarlos.</p>";
            return;
        }

        links.forEach(link => {
            const item = document.createElement('div');
            item.className = 'link-item';
            item.innerHTML = `
                <a href="${link}" target="_blank">${link}</a>
                <button onclick="copyToClipboard('${link}')" style="background:#30363d; color:white; font-size:10px;">Copiar</button>
            `;
            resultsDiv.appendChild(item);
        });
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text);
        alert("Enlace copiado");
    }
</script>

</body>
</html>
