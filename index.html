<!doctype html>
<html lang="es">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stream Sniper v5 | Deep Crawler &amp; History</title>
  <style>
        :root {
            --bg: #09090b; --card: #18181b; --accent: #8b5cf6;
            --text: #ececec; --border: #27272a; --video: #10b981;
            --ad: #ef4444; --player: #3b82f6; --script: #eab308;
            --html: #38bdf8; --all: #f97316;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; }
        .container { width: 100%; max-width: 1000px; margin: auto; }
        
        .panel { 
            background: var(--card); border: 1px solid var(--border); 
            padding: 20px; border-radius: 12px; margin-bottom: 15px;
        }

        .drop-zone {
            border: 2px dashed var(--accent); padding: 25px; text-align: center;
            border-radius: 10px; background: rgba(139, 92, 246, 0.05);
            cursor: pointer; margin-bottom: 15px; transition: 0.3s;
        }
        input[type="file"] { display: none; }

        textarea { 
            width: 100%; height: 120px; background: #000; color: #10b981; 
            border: 1px solid var(--border); border-radius: 8px; padding: 12px;
            font-family: monospace; font-size: 13px; margin-top: 10px;
        }

        .btn { 
            width: 100%; padding: 14px; border-radius: 8px; border: none; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px;
        }
        .btn-extract { background: var(--accent); color: white; }

        /* Estilos Historial */
        .history-panel {
            background: #111; border: 1px solid var(--border);
            border-radius: 8px; padding: 10px; margin-bottom: 15px;
            max-height: 200px; overflow-y: auto;
        }
        .history-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px; border-bottom: 1px solid #222; font-size: 11px;
        }
        .history-item:last-child { border: none; }
        .btn-load-hist { background: var(--video); color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; margin-left: 5px; }
        .btn-clear-hist { background: var(--ad); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 11px; margin-top: 5px; }

        .copy-group { 
            display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 15px; 
            background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; 
            border: 1px solid var(--border);
        }
        .btn-copy-cat { 
            flex: 1; min-width: 80px; padding: 6px; font-size: 9px; 
            border-radius: 4px; border: 1px solid var(--border); 
            background: #27272a; color: white; cursor: pointer; font-weight: bold;
        }
        .btn-copy-all { background: var(--all) !important; color: white !important; }

        .stats { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; justify-content: center; }
        .stat-item { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; border: 1px solid var(--border); background: var(--card); }

        .table-wrapper { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: #27272a; padding: 10px; text-align: left; }
        td { padding: 8px; border-bottom: 1px solid var(--border); word-break: break-all; }

        .tag { padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: bold; white-space: nowrap; display: inline-block; margin-bottom: 4px; }
        .tag-video { background: rgba(16, 185, 129, 0.2); color: var(--video); }
        .tag-m3u { background: rgba(139, 92, 246, 0.2); color: var(--accent); }
        .tag-ad { background: rgba(239, 68, 68, 0.2); color: var(--ad); }
        .tag-player { background: rgba(59, 130, 246, 0.2); color: var(--player); }
        .tag-js { background: rgba(234, 179, 8, 0.2); color: var(--script); }
        .tag-html { background: rgba(56, 189, 248, 0.2); color: var(--html); }

        .copy-btn { background: #3f3f46; color: white; padding: 4px; border-radius: 4px; cursor: pointer; border: none; font-size: 9px; }
    </style>
 </head>
 <body>
  <div class="container">
   <div class="panel">
    <h2 style="margin:0 0 15px 0; font-size: 1.1rem; text-align: center; color: var(--accent);">🔍 CRAWLER MAESTRO</h2>
    
    <div id="historySection" style="display:none;">
        <p style="font-size: 10px; color: #888; margin-bottom: 5px;">ÚLTIMOS ANÁLISIS:</p>
        <div class="history-panel" id="historyList"></div>
        <button class="btn-clear-hist" onclick="clearHistory()">BORRAR TODO EL HISTORIAL</button>
        <hr style="border: 0; border-top: 1px solid #27272a; margin: 15px 0;">
    </div>

    <label class="drop-zone" id="dropArea"> 
        <span id="labelTxt">📁 Arrastra fuente o clic aquí</span> 
        <input type="file" id="fileInput" accept=".html,.txt,.xml,.js"> 
    </label> 
    <textarea id="sourceInput" placeholder="O pega el código directamente aquí..."></textarea>
    <button class="btn btn-extract" onclick="runCrawl()">Analizar y Clasificar Todo</button>
   </div>

   <div id="statsArea" class="stats"></div>

   <div class="copy-group" id="copyGroup" style="display:none;">
       <button class="btn-copy-cat btn-copy-all" onclick="copyEverything()">📋 COPIAR TODO</button>
       <button class="btn-copy-cat" onclick="copyAllByType('m3u')">📋 M3U8</button>
       <button class="btn-copy-cat" onclick="copyAllByType('video')">📋 Videos</button>
       <button class="btn-copy-cat" onclick="copyAllByType('html')">📋 HTML</button>
       <button class="btn-copy-cat" onclick="copyAllByType('ad')">📋 Ads</button>
       <button class="btn-copy-cat" onclick="copyAllByType('script')">📋 Scripts</button>
   </div>

   <div class="table-wrapper">
    <table>
     <thead><tr><th width="20%">TIPO</th><th width="70%">ENLACE</th><th width="10%">MÁS</th></tr></thead>
     <tbody id="resultsBody"></tbody>
    </table>
   </div>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const labelTxt = document.getElementById('labelTxt');
    const sourceInput = document.getElementById('sourceInput');
    let globalResults = [];

    window.onload = () => { renderHistory(); };

    fileInput.onchange = e => {
        if(e.target.files[0]) labelTxt.innerText = "📄 " + e.target.files[0].name;
    };

    async function runCrawl(contentFromHistory = null) {
        let content = contentFromHistory || sourceInput.value;
        const file = fileInput.files[0];

        if (!contentFromHistory && file) content = await file.text();
        if (!content) return alert("Sube un archivo o pega el código.");

        if (!contentFromHistory) {
            saveToHistory(content);
        }

        const urlRegex = /(https?:\/\/[^\s"'<>\]]+)/g;
        const matches = content.match(urlRegex) || [];
        const uniqueLinks = [...new Set(matches)];

        const resultsBody = document.getElementById('resultsBody');
        resultsBody.innerHTML = "";
        globalResults = [];
        const c = { m3u: 0, video: 0, player: 0, ad: 0, script: 0, html: 0, other: 0 };

        uniqueLinks.forEach(link => {
            const clean = link.split(/[\\"']/)[0];
            const info = categorize(clean);
            c[info.key]++;
            globalResults.push({ url: clean, key: info.key });

            const row = document.createElement('tr');
            row.innerHTML = `
                <td><span class="tag ${info.class}">${info.label}</span></td>
                <td><a href="${clean}" target="_blank" style="color:#38bdf8; text-decoration:none;">${clean}</a></td>
                <td><button class="copy-btn" onclick="navigator.clipboard.writeText('${clean}');alert('Copiado')">CLIP</button></td>
            `;
            resultsBody.appendChild(row);
        });

        document.getElementById('copyGroup').style.display = "flex";
        updateStats(c, uniqueLinks.length);
        renderHistory();
    }

    function categorize(u) {
        const l = u.toLowerCase();
        if (l.includes('.m3u8') || l.includes('master.m3u8') || l.includes('.mpd')) return { label: 'STREAMING', class: 'tag-m3u', key: 'm3u' };
        if (l.match(/\.(mp4|mkv|webm|ts|avi|mov|wmv|flv|ogv|m4v|3gp|mpeg|mpg)/)) return { label: 'VIDEO', class: 'tag-video', key: 'video' };
        if (l.includes('.html') || l.includes('.htm')) return { label: 'HTML', class: 'tag-html', key: 'html' };
        if (l.includes('player') || l.includes('vjs') || l.includes('jwplayer')) return { label: 'PLAYER', class: 'tag-player', key: 'player' };
        if (l.match(/(betwinner|adangle|ads|vast|tracking|pixel|agl003|spix)/)) return { label: 'AD/TRACKER', class: 'tag-ad', key: 'ad' };
        if (l.endsWith('.js') || l.includes('.min.js')) return { label: 'JS SCRIPT', class: 'tag-js', key: 'script' };
        return { label: 'ENLACE', class: '', key: 'other' };
    }

    function updateStats(c, total) {
        document.getElementById('statsArea').innerHTML = `
            <span class="stat-item" style="background:var(--all); color:white">📊 TOTAL: ${total}</span>
            <span class="stat-item">🎬 M3U8: ${c.m3u}</span>
            <span class="stat-item">🎥 Videos: ${c.video}</span>
            <span class="stat-item">🌐 HTML: ${c.html}</span>
            <span class="stat-item">📢 Ads: ${c.ad}</span>
            <span class="stat-item">⚙️ JS: ${c.script}</span>
        `;
    }

    function copyAllByType(type) {
        const filtered = globalResults.filter(item => item.key === type).map(item => item.url).join('\n');
        if (filtered) {
            navigator.clipboard.writeText(filtered).then(() => alert("Copiados " + filtered.split('\n').length + " enlaces"));
        }
    }

    // NUEVA FUNCIÓN: COPIAR TODO SIN IMPORTAR FORMATO
    function copyEverything() {
        const allLinks = globalResults.map(item => item.url).join('\n');
        if (allLinks) {
            navigator.clipboard.writeText(allLinks).then(() => {
                alert("¡Se han copiado los " + globalResults.length + " enlaces encontrados!");
            });
        } else {
            alert("No hay enlaces para copiar.");
        }
    }

    function saveToHistory(text) {
        let history = JSON.parse(localStorage.getItem('crawl_history') || "[]");
        const date = new Date().toLocaleString();
        const snippet = text.substring(0, 30).replace(/</g, "&lt;") + "...";
        history.unshift({ date, snippet, fullText: text });
        if (history.length > 10) history.pop();
        localStorage.setItem('crawl_history', JSON.stringify(history));
    }

    function renderHistory() {
        const history = JSON.parse(localStorage.getItem('crawl_history') || "[]");
        const list = document.getElementById('historyList');
        const section = document.getElementById('historySection');
        if (history.length === 0) {
            section.style.display = "none";
            return;
        }
        section.style.display = "block";
        list.innerHTML = history.map((item, index) => `
            <div class="history-item">
                <span><strong>${item.date}</strong><br><small>${item.snippet}</small></span>
                <button class="btn-load-hist" onclick="loadFromHistory(${index})">CARGAR</button>
            </div>
        `).join('');
    }

    function loadFromHistory(index) {
        const history = JSON.parse(localStorage.getItem('crawl_history') || "[]");
        const item = history[index];
        sourceInput.value = item.fullText;
        runCrawl(item.fullText);
    }

    function clearHistory() {
        if(confirm("¿Seguro que quieres borrar todo el historial?")) {
            localStorage.removeItem('crawl_history');
            renderHistory();
        }
    }
</script>
 </body>
</html>
